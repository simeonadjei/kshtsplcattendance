<!DOCTYPE html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .logo {
      width: 300px;
      display: block;
      margin: auto;
      margin-bottom: 15px;
    }

    h2 {
      text-align: center;
      margin: 5px;
    }

    h3 {
      text-align: center;
      margin-top: 0;
      color: #444;
    }

    input, select, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: #1b5e20;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2e7d32;
    }

    .success {
      color: green;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }

    .error {
      color: red;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
